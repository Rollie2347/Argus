<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Argus — The All-Seeing Companion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #video-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: #000;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        #header {
            padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        #header .eye {
            font-size: 24px;
        }

        #status-badge {
            margin-left: auto;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            color: #888;
        }

        #status-badge.connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        #status-badge.listening {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            animation: pulse 2s infinite;
        }

        #status-badge.speaking {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #bottom-panel {
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }

        #transcript {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .transcript-line {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .transcript-line.argus {
            color: #a78bfa;
        }

        .transcript-line.user {
            color: #60a5fa;
        }

        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.92);
        }

        #btn-connect {
            background: #22c55e;
            color: white;
            width: 80px;
            height: 80px;
            font-size: 32px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
        }

        #btn-connect.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        #btn-camera {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        #btn-mute {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        #btn-mute.muted {
            background: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #start-screen .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        #start-screen h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #start-screen p {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }

        #btn-start {
            padding: 16px 48px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #a78bfa, #3b82f6);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }

        #btn-start:active {
            transform: scale(0.95);
        }

        #waveform {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-bottom: 16px;
        }

        .wave-bar {
            width: 4px;
            background: #a78bfa;
            border-radius: 2px;
            transition: height 0.1s;
            height: 4px;
        }

        canvas#frame-canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="logo">👁️</div>
        <h1>ARGUS</h1>
        <p>The All-Seeing Companion</p>
        <button id="btn-start">Start Argus</button>
    </div>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="frame-canvas"></canvas>

        <div id="overlay">
            <div id="header">
                <span class="eye">👁️</span>
                <h1>ARGUS</h1>
                <span id="status-badge">Offline</span>
            </div>

            <div id="bottom-panel">
                <div id="waveform"></div>
                <div id="transcript"></div>
                <div id="controls">
                    <button class="btn" id="btn-mute">🎤</button>
                    <button class="btn" id="btn-connect">📞</button>
                    <button class="btn" id="btn-camera">🔄</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_WS = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
        // If running locally with separate backend:
        // const BACKEND_WS = 'ws://localhost:8080/ws';

        let ws = null;
        let mediaStream = null;
        let audioContext = null;
        let audioProcessor = null;
        let playbackContext = null;
        let isConnected = false;
        let isMuted = false;
        let facingMode = 'environment'; // back camera by default
        let frameInterval = null;

        const startScreen = document.getElementById('start-screen');
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('frame-canvas');
        const ctx = canvas.getContext('2d');
        const statusBadge = document.getElementById('status-badge');
        const transcript = document.getElementById('transcript');
        const btnStart = document.getElementById('btn-start');
        const btnConnect = document.getElementById('btn-connect');
        const btnMute = document.getElementById('btn-mute');
        const btnCamera = document.getElementById('btn-camera');
        const waveform = document.getElementById('waveform');

        // Create waveform bars
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            waveform.appendChild(bar);
        }
        const waveBars = document.querySelectorAll('.wave-bar');

        function setStatus(status, text) {
            statusBadge.className = status;
            statusBadge.textContent = text;
        }

        function addTranscript(text, role) {
            const line = document.createElement('div');
            line.className = `transcript-line ${role}`;
            line.textContent = role === 'argus' ? `👁️ ${text}` : `🗣️ ${text}`;
            transcript.appendChild(line);
            transcript.scrollTop = transcript.scrollHeight;
            // Keep only last 10 lines
            while (transcript.children.length > 10) {
                transcript.removeChild(transcript.firstChild);
            }
        }

        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                    }
                });
                video.srcObject = mediaStream;
                return true;
            } catch (err) {
                console.error('Camera/mic error:', err);
                alert('Argus needs camera and microphone access to work. Please grant permissions and try again.');
                return false;
            }
        }

        function startAudioCapture() {
            audioContext = new AudioContext({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(mediaStream);

            // Use ScriptProcessor for broad compatibility (AudioWorklet better but needs more setup)
            audioProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            audioProcessor.onaudioprocess = (e) => {
                if (!ws || ws.readyState !== WebSocket.OPEN || isMuted) return;

                const float32 = e.inputBuffer.getChannelData(0);
                // Convert float32 to int16 PCM
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, Math.floor(float32[i] * 32768)));
                }

                const b64 = arrayBufferToBase64(int16.buffer);
                ws.send(JSON.stringify({ type: 'audio', data: b64 }));

                // Update waveform visualization
                const rms = Math.sqrt(float32.reduce((sum, v) => sum + v * v, 0) / float32.length);
                updateWaveform(rms);
            };

            source.connect(audioProcessor);
            audioProcessor.connect(audioContext.destination);
        }

        function startVideoCapture() {
            // Send a video frame every 2 seconds
            canvas.width = 640;
            canvas.height = 480;

            frameInterval = setInterval(() => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;

                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                const b64 = dataUrl.split(',')[1];
                ws.send(JSON.stringify({ type: 'image', data: b64 }));
            }, 2000);
        }

        function connectWebSocket() {
            ws = new WebSocket(BACKEND_WS);

            ws.onopen = () => {
                console.log('🔗 WebSocket connected');
                isConnected = true;
                setStatus('connected', '● Connected');
                btnConnect.classList.add('active');
                btnConnect.textContent = '📵';

                startAudioCapture();
                startVideoCapture();

                setTimeout(() => setStatus('listening', '● Listening'), 1000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'connected') {
                    setStatus('listening', '● Listening');
                    addTranscript('Argus is ready. I can see and hear you.', 'argus');
                } else if (msg.type === 'audio') {
                    setStatus('speaking', '● Speaking');
                    playAudio(msg.data);
                } else if (msg.type === 'text') {
                    addTranscript(msg.data, 'argus');
                } else if (msg.type === 'turn_complete') {
                    setStatus('listening', '● Listening');
                } else if (msg.type === 'error') {
                    addTranscript('Error: ' + msg.data, 'argus');
                    setStatus('', 'Error');
                }
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                disconnect();
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                addTranscript('Connection error. Try again.', 'argus');
                disconnect();
            };
        }

        function disconnect() {
            isConnected = false;
            setStatus('', 'Offline');
            btnConnect.classList.remove('active');
            btnConnect.textContent = '📞';

            if (frameInterval) clearInterval(frameInterval);
            if (audioProcessor) audioProcessor.disconnect();
            if (audioContext) audioContext.close();
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();
            ws = null;
        }

        async function playAudio(b64Data) {
            try {
                if (!playbackContext) {
                    playbackContext = new AudioContext({ sampleRate: 24000 });
                }

                const bytes = base64ToArrayBuffer(b64Data);
                const int16 = new Int16Array(bytes);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) {
                    float32[i] = int16[i] / 32768;
                }

                const buffer = playbackContext.createBuffer(1, float32.length, 24000);
                buffer.getChannelData(0).set(float32);

                const source = playbackContext.createBufferSource();
                source.buffer = buffer;
                source.connect(playbackContext.destination);
                source.start();

                // Animate waveform during playback
                const rms = Math.sqrt(float32.reduce((sum, v) => sum + v * v, 0) / float32.length);
                updateWaveform(rms * 3);
            } catch (err) {
                console.error('Audio playback error:', err);
            }
        }

        function updateWaveform(intensity) {
            const scale = Math.min(intensity * 50, 1);
            waveBars.forEach((bar, i) => {
                const h = 4 + Math.random() * scale * 32;
                bar.style.height = `${h}px`;
            });
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function base64ToArrayBuffer(b64) {
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // Event listeners
        btnStart.addEventListener('click', async () => {
            const ok = await startCamera();
            if (ok) {
                startScreen.style.display = 'none';
            }
        });

        btnConnect.addEventListener('click', () => {
            if (isConnected) {
                disconnect();
            } else {
                connectWebSocket();
            }
        });

        btnMute.addEventListener('click', () => {
            isMuted = !isMuted;
            btnMute.textContent = isMuted ? '🔇' : '🎤';
            btnMute.classList.toggle('muted', isMuted);
        });

        btnCamera.addEventListener('click', async () => {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
            }
            await startCamera();
        });
    </script>
</body>
</html>
